<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient matching the website's primary, secondary, and accent colors -->
    <linearGradient id="vm-favicon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    {/* Subtle glow filter */}
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing background elements for premium feel in dark/light browser tabs -->
  <rect width="100" height="100" rx="20" fill="#080C14" />
  <rect width="92" height="92" x="4" y="4" rx="16" fill="#030014" stroke="url(#vm-favicon-gradient)" stroke-width="2" opacity="0.3" />

  <!-- Letter 'V' -->
  <path
    d="M22 34 L40 66 L48 52"
    stroke="url(#vm-favicon-gradient)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Letter 'M' -->
  <path
    d="M48 66 L48 36 L62 58 L76 36 L76 66"
    stroke="url(#vm-favicon-gradient)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
